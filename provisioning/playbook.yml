---

# ==============================
# Disable QXL (Linux only)
# ==============================

- name: disable qxl
  hosts:
    - routers
    - server
  gather_facts: yes
  become: yes
  tasks:
    - include_role:
        name: disable-qxl
      when: ansible_os_family == 'Debian'


# ==============================
# Linux Server Setup
# ==============================

- name: set up server
  hosts: server
  become: yes
  roles:
    - role: server
      telnet_port: "{{ telnet_port }}"
      flag: "{{ alice_flag }}"
      flag_2: "{{ root_flag }}"


# ==============================
# Windows Client Configuration
# (NO reboot here)
# ==============================

- name: set up windows client
  hosts: windows-host
  gather_facts: yes
  tasks:

    - name: Create local Windows user
      ansible.windows.win_user:
        name: user
        password: Password123
        state: present
        groups:
          - Users

    - name: Enable Remote Desktop
      ansible.windows.win_regedit:
        path: HKLM:\System\CurrentControlSet\Control\Terminal Server
        name: fDenyTSConnections
        data: 0
        state: present

    - name: Enable RDP firewall rule
      ansible.windows.win_firewall_rule:
        name: "Remote Desktop"
        enable: yes

    - name: Add user to Remote Desktop Users group
      ansible.windows.win_group_membership:
        name: "Remote Desktop Users"
        members: user
        state: present


# ==============================
# Command Logging (Linux Server)
# ==============================

- name: set up command logging
  hosts: server
  become: yes
  roles:
    - role: sandbox-logging
      slf_destination_port: '{% if hostvars["man"] is defined -%} 514 {%- else -%} 515 {%- endif %}'


# ==============================
# Windows Hostname (ONLY reboot here)
# ==============================

- name: remove stack name prefix from hostnames of winrm nodes
  hosts: windows-host
  gather_facts: yes
  tasks:

    - name: Set Windows hostname
      ansible.windows.win_hostname:
        name: "{{ inventory_hostname }}"
      register: rename_result

    - name: Reboot Windows asynchronously if required
      ansible.windows.win_reboot:
        reboot_timeout: 1800
      async: 1
      poll: 0
      when: rename_result.reboot_required

    - name: Wait for WinRM to come back online
      wait_for_connection:
        timeout: 1800
        delay: 60
        sleep: 10
      when: rename_result.reboot_required


# ==============================
# Linux Hostname Cleanup
# ==============================

- name: remove stack name prefix from hostnames of Linux nodes
  hosts:
    - server
    - routers
    - man
  gather_facts: yes
  become: yes
  tasks:

    - name: Set new hostname
      hostname:
        name: "{{ inventory_hostname }}"

    - name: Make cloud-init preserve hostname changes
      lineinfile:
        path: /etc/cloud/cloud.cfg
        regexp: '^preserve_hostname:'
        line: 'preserve_hostname: true'
        create: yes

    - name: Remove stack name prefix from /etc/hosts
      lineinfile:
        path: /etc/hosts
        regexp: '^\d+\.\d+\.\d+\.\d+\s+{{ stack_prefix }}'
        state: absent
      when: stack_prefix is defined
