---
- name: Update apt cache
  apt:
    update_cache: yes

- name: Install prerequisites for MongoDB repo
  apt:
    name:
      - gnupg
      - curl
    state: present

- name: Add MongoDB GPG key
  shell: |
    curl -fsSL https://www.mongodb.org/static/pgp/server-7.0.asc | \
    gpg --dearmor -o /etc/apt/trusted.gpg.d/mongodb-server-7.0.gpg
  args:
    creates: /etc/apt/trusted.gpg.d/mongodb-server-7.0.gpg

- name: Add MongoDB apt repository (Debian bookworm — compatible with Kali)
  apt_repository:
    repo: "deb [ arch=amd64,arm64 ] https://repo.mongodb.org/apt/debian bookworm/mongodb-org/7.0 main"
    state: present
    filename: mongodb-org-7.0

- name: Update apt cache after adding MongoDB repo
  apt:
    update_cache: yes

- name: Install attack tools
  apt:
    pkg:
      - nmap
      - hydra
      - medusa
      - sqlmap
      - mongodb-database-tools
      - mongodb-mongosh
      - default-mysql-client
      - curl
      - wget
      - netcat-openbsd
      - john
    state: present

- name: Ensure wordlists directory exists
  file:
    path: /usr/share/wordlists
    state: directory
    mode: '0755'

- name: Download rockyou wordlist
  get_url:
    url: https://github.com/brannondorsey/naive-hashcat/releases/download/data/rockyou.txt
    dest: /usr/share/wordlists/rockyou.txt
    mode: '0644'

- name: Add host aliases for easy access
  blockinfile:
    path: /etc/hosts
    block: |
      192.168.20.5 server
      192.168.30.5 windows-host
      192.168.40.5 db-server

- name: Create attacker home directory structure
  file:
    path: /home/debian/exercise
    state: directory
    owner: debian
    mode: '0755'

- name: Place attack cheatsheet for students
  copy:
    dest: /home/debian/exercise/README.txt
    owner: debian
    mode: '0644'
    content: |
      === CyberRangeCZ Attack Exercise ===

      Targets:
        db-server (192.168.40.5)
          - MySQL   : port 3306   (user: dbuser, try brute-force)
          - MongoDB : port 27017  (unauthenticated — enumerate directly)

      Useful commands:

      --- Network Recon ---
      nmap -sV -p 3306,27017 192.168.40.5

      --- MySQL Brute-force ---
      hydra -l dbuser -P /usr/share/wordlists/rockyou.txt mysql://192.168.40.5

      --- MySQL Manual Access ---
      mysql -h 192.168.40.5 -u dbuser -p
      > USE company;
      > SELECT * FROM employees;

      --- MongoDB (no auth) ---
      mongosh --host 192.168.40.5 --port 27017
      > use records
      > db.flags.find()

      --- SQLMap against MySQL ---
      sqlmap -d "mysql://dbuser:PASSWORD@192.168.40.5/company" --dump