## How the Exercise Flow Works
```
Kali (192.168.30.10)
        │
        │  nmap scan → discovers ports 3306 + 27017 on db-server
        │
        ▼
DB Server (192.168.40.5)
  ├── MySQL :3306   → brute-force with Hydra → login → SELECT flag from employees table
  └── MongoDB :27017 → no auth → mongosh connect → db.flags.find() → read flag